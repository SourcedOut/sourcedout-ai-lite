<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>SourcedOut — Signing in…</title>
<style>
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; background: #100d09; color: #ede8e0; }
  .box { text-align: center; padding: 32px; }
  .brand { width: 56px; height: 56px; margin: 0 auto 16px; display: block; }
  .icon { font-size: 40px; margin-bottom: 12px; }
  h2 { font-size: 18px; margin: 0 0 8px; font-weight: 700; color: #ede8e0; }
  p { font-size: 13px; color: #857b6e; margin: 0; }
  .spinner { width: 26px; height: 26px; margin: 16px auto 0; border: 3px solid #2c2519; border-top-color: #f06a12; border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div class="box" id="box">
  <svg class="brand" viewBox="0 0 64 64" role="img" aria-label="SourcedOut">
    <defs>
      <linearGradient id="soGrad" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#d4380a"/><stop offset=".5" stop-color="#f06a12"/><stop offset="1" stop-color="#f9a825"/></linearGradient>
      <mask id="soMask"><circle cx="32" cy="32" r="30" fill="#fff"/><text x="32" y="35" text-anchor="middle" dominant-baseline="central" font-family="-apple-system,'Segoe UI',sans-serif" font-weight="800" font-size="38" fill="#000">S</text></mask>
    </defs>
    <circle cx="32" cy="32" r="30" fill="url(#soGrad)" mask="url(#soMask)"/>
  </svg>
  <h2>Signing you in…</h2>
  <p>Just a moment.</p>
  <div class="spinner"></div>
</div>
<script type="module" src="auth-callback.js"></script>
</body>
</html>
